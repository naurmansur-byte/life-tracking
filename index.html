<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Life Tracker</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Life Tracker">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --iman: #7c3aed;
            --iman-light: #ede9fe;
            --studying: #059669;
            --studying-light: #d1fae5;
            --sport: #dc2626;
            --sport-light: #fee2e2;
            --community: #f59e0b;
            --community-light: #fef3c7;
            --bg: #f8f9fc;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #94a3b8;
            --border: #e8ecf1;
            --shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: #e8ecf1;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            height: 100dvh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        /* АВТОРИЗАЦИЯ */
        .auth-screen {
            position: absolute;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .auth-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .auth-logo {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .auth-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        .auth-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            text-align: center;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8ecf1;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            outline: none;
            background: var(--card);
            color: var(--text);
            transition: border-color 0.2s;
        }
        .auth-input:focus { border-color: #6366f1; }
        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.15s;
            color: white;
            background: #6366f1;
        }
        .auth-btn:active { transform: scale(0.97); }
        .auth-btn.secondary {
            background: transparent;
            color: #6366f1;
            border: 2px solid #6366f1;
        }
        .auth-error {
            color: #ef4444;
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-align: center;
            min-height: 20px;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .auth-tab {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: #e8ecf1;
            color: var(--text);
            font-weight: 600;
        }

        /* HEADER */
        .header {
            padding: 24px 20px 8px;
            text-align: center;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .header-left { text-align: left; }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .header .date {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .logout-btn {
            background: none;
            border: 1px solid #e8ecf1;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .logout-btn:active { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

        /* RINGS */
        .rings-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            padding: 10px 20px 16px;
            flex-shrink: 0;
        }
        .ring-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
        }
        .ring-group:active { transform: scale(0.96); }
        .ring-wrapper {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            transition: box-shadow 0.3s ease;
        }
        .ring-group.active .ring-wrapper {
            box-shadow: 0 0 0 3px var(--ring-glow, transparent);
        }
        .ring-group.iman { --ring-color: var(--iman); --ring-glow: rgba(124, 58, 237, 0.25); }
        .ring-group.studying { --ring-color: var(--studying); --ring-glow: rgba(5, 150, 105, 0.25); }
        .ring-group.sport { --ring-color: var(--sport); --ring-glow: rgba(220, 38, 38, 0.25); }
        .ring-group.all { --ring-color: #6366f1; --ring-glow: rgba(99, 102, 241, 0.25); }
        .ring-wrapper svg { transform: rotate(-90deg); width: 52px; height: 52px; }
        .ring-bg { fill: none; stroke: #e8ecf1; stroke-width: 4.5; }
        .ring-fill {
            fill: none;
            stroke-width: 4.5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ring-group.iman .ring-fill { stroke: var(--iman); }
        .ring-group.studying .ring-fill { stroke: var(--studying); }
        .ring-group.sport .ring-fill { stroke: var(--sport); }
        .ring-group.all .ring-fill { stroke: #6366f1; }
        .ring-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .ring-group.iman .ring-label { color: var(--iman); }
        .ring-group.studying .ring-label { color: var(--studying); }
        .ring-group.sport .ring-label { color: var(--sport); }
        .ring-group.all .ring-label { color: #6366f1; }
        .ring-group-title {
            font-size: 0.6rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            transition: color 0.2s, font-weight 0.2s;
        }
        .ring-group.active .ring-group-title { color: var(--text); font-weight: 600; }

        /* TAB CONTENT */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 90px;
            -webkit-overflow-scrolling: touch;
        }
        .tab-content::-webkit-scrollbar { display: none; }

        /* TASKS */
        .category-section { margin-bottom: 20px; }
        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 0 2px;
        }
        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .category-dot.iman { background: var(--iman); }
        .category-dot.studying { background: var(--studying); }
        .category-dot.sport { background: var(--sport); }
        .category-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .category-header .progress-text {
            margin-left: auto;
            font-size: 0.68rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .task-list { display: flex; flex-direction: column; gap: 4px; }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.15s;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
            min-height: 48px;
        }
        .task-item:active { transform: scale(0.985); background: #fafafa; }
        .task-item.completed { opacity: 0.55; }
        .task-item.completed .task-text { text-decoration: line-through; color: #bbb; }
        .task-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.7rem;
            color: transparent;
            z-index: 1;
        }
        .task-item.completed .task-check {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }
        .task-text {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text);
            word-break: break-word;
            line-height: 1.3;
            z-index: 1;
        }
        .task-delete {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #d1d5db;
            padding: 8px 6px;
            z-index: 2;
        }
        .task-delete:active { color: #ef4444; }
        .add-task-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .add-task-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px dashed #d1d5db;
            border-radius: 10px;
            font-size: 0.8rem;
            background: transparent;
            outline: none;
            transition: border-color 0.2s;
            color: var(--text);
        }
        .add-task-row input:focus { border-color: #6366f1; border-style: solid; }
        .add-task-row input::placeholder { color: #cbd5e1; }
        .add-task-row button {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.15s;
            color: white;
            letter-spacing: 0.3px;
        }
        .add-task-row button:active { transform: scale(0.95); }

        /* COMMUNITY TAB */
        .friend-card {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            box-shadow: var(--shadow);
        }
        .friend-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .friend-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e8ecf1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }
        .friend-info { flex: 1; }
        .friend-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
        }
        .friend-status {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .friend-progress {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .friend-progress-item {
            flex: 1;
            text-align: center;
            padding: 6px 4px;
            background: #f8f9fc;
            border-radius: 8px;
            font-size: 0.65rem;
        }
        .friend-progress-value {
            font-weight: 700;
            font-size: 0.85rem;
        }
        .add-friend-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .add-friend-row input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #e8ecf1;
            border-radius: 10px;
            font-size: 0.8rem;
            outline: none;
            background: var(--card);
        }
        .add-friend-row input:focus { border-color: #6366f1; }
        .add-friend-row button {
            padding: 12px 16px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* CALENDAR */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-day-name {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .calendar-day {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            background: transparent;
            color: var(--text);
        }
        .calendar-day:active { background: #f1f5f9; }
        .calendar-day.today { background: #6366f1; color: white; font-weight: 600; }
        .calendar-day.other-month { opacity: 0.25; }
        .calendar-day .mini-dots { display: flex; gap: 2px; margin-top: 2px; }
        .calendar-day .mini-dot { width: 3px; height: 3px; border-radius: 50%; }
        .mini-dot.iman { background: var(--iman); }
        .mini-dot.studying { background: var(--studying); }
        .mini-dot.sport { background: var(--sport); }
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .calendar-header button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px 12px;
            color: var(--text-secondary);
        }
        .calendar-header button:active { color: var(--text); }
        .calendar-header h3 { font-size: 0.9rem; font-weight: 600; color: var(--text); }

        /* PROFILE */
        .profile-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e8ecf1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #cbd5e1;
            margin: 0 auto 10px;
        }
        .profile-name-input {
            border: none;
            background: transparent;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            width: 100%;
            outline: none;
            padding: 4px 0;
        }
        .profile-name-input:focus { border-bottom: 2px solid #6366f1; }
        .profile-name-input::placeholder { color: #d1d5db; font-weight: 400; }
        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 14px;
            gap: 6px;
        }
        .profile-stat { text-align: center; flex: 1; }
        .profile-stat-value { font-size: 1.2rem; font-weight: 700; color: var(--text); }
        .profile-stat-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-title {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin: 14px 0 8px;
            padding: 0 4px;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 6px 16px;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
            gap: 4px;
            justify-content: center;
            z-index: 10;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.55rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            padding: 6px 4px;
            border-radius: 8px;
            letter-spacing: 0.3px;
            flex: 1;
            min-width: 0;
        }
        .nav-btn.active { color: #6366f1; }
        .nav-btn .nav-icon { font-size: 1rem; transition: transform 0.15s; }
        .nav-btn.active .nav-icon { transform: translateY(-1px); }
        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .empty-hint {
            text-align: center;
            color: #d1d5db;
            font-size: 0.8rem;
            padding: 24px 0;
            font-weight: 400;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-item { animation: fadeUp 0.25s ease; }

        @media (max-width: 360px) {
            .rings-container { gap: 12px; }
            .ring-wrapper { width: 44px; height: 44px; }
            .ring-wrapper svg { width: 44px; height: 44px; }
            .bottom-nav { padding: 4px 8px; }
            .nav-btn { font-size: 0.5rem; padding: 4px 2px; }
            .nav-btn .nav-icon { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- ЭКРАН АВТОРИЗАЦИИ -->
        <div class="auth-screen" id="authScreen">
            <div class="auth-logo">🌈</div>
            <div class="auth-title">Life Tracker</div>
            <div class="auth-subtitle">Track habits together</div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" data-mode="login" onclick="switchAuthMode('login')">Sign In</div>
                <div class="auth-tab" data-mode="register" onclick="switchAuthMode('register')">Sign Up</div>
            </div>
            
            <input type="text" class="auth-input" id="authName" placeholder="Your name" style="display:none;">
            <input type="email" class="auth-input" id="authEmail" placeholder="Email">
            <input type="password" class="auth-input" id="authPassword" placeholder="Password">
            <div class="auth-error" id="authError"></div>
            
            <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Sign In</button>
            <button class="auth-btn secondary" id="googleAuthBtn" onclick="handleGoogleAuth()">
                Continue with Google
            </button>
        </div>

        <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
        <div id="mainInterface" style="display:none; flex-direction: column; height: 100%;">
            <div class="header">
                <div class="header-left">
                    <h1>Life Tracker</h1>
                    <p class="date" id="dateDisplay"></p>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="rings-container" id="ringsContainer">
                <div class="ring-group iman active" data-category="iman" onclick="selectCategory('iman')">
                    <div class="ring-wrapper">
                        <svg viewBox="0 0 52 52">
                            <circle class="ring-bg" cx="26" cy="26" r="22"/>
                            <circle class="ring-fill" cx="26" cy="26" r="22" stroke-dasharray="138.23" stroke-dashoffset="138.23" id="ring-iman"/>
                        </svg>
                        <div class="ring-label" id="ringLabel-iman">0%</div>
                    </div>
                    <span class="ring-group-title">Iman</span>
                </div>
                <div class="ring-group studying" data-category="studying" onclick="selectCategory('studying')">
                    <div class="ring-wrapper">
                        <svg viewBox="0 0 52 52">
                            <circle class="ring-bg" cx="26" cy="26" r="22"/>
                            <circle class="ring-fill" cx="26" cy="26" r="22" stroke-dasharray="138.23" stroke-dashoffset="138.23" id="ring-studying"/>
                        </svg>
                        <div class="ring-label" id="ringLabel-studying">0%</div>
                    </div>
                    <span class="ring-group-title">Studying</span>
                </div>
                <div class="ring-group sport" data-category="sport" onclick="selectCategory('sport')">
                    <div class="ring-wrapper">
                        <svg viewBox="0 0 52 52">
                            <circle class="ring-bg" cx="26" cy="26" r="22"/>
                            <circle class="ring-fill" cx="26" cy="26" r="22" stroke-dasharray="138.23" stroke-dashoffset="138.23" id="ring-sport"/>
                        </svg>
                        <div class="ring-label" id="ringLabel-sport">0%</div>
                    </div>
                    <span class="ring-group-title">Sport</span>
                </div>
                <div class="ring-group all" onclick="selectCategory('all')">
                    <div class="ring-wrapper">
                        <svg viewBox="0 0 52 52">
                            <circle class="ring-bg" cx="26" cy="26" r="22"/>
                            <circle class="ring-fill" cx="26" cy="26" r="22" stroke-dasharray="138.23" stroke-dashoffset="138.23" id="ring-all"/>
                        </svg>
                        <div class="ring-label" id="ringLabel-all">0%</div>
                    </div>
                    <span class="ring-group-title">All</span>
                </div>
            </div>

            <div class="tab-content" id="tabContent"></div>

            <div class="bottom-nav">
                <button class="nav-btn active" data-tab="progress" onclick="switchTab('progress')">
                    <span class="nav-icon">●</span><span>Progress</span>
                </button>
                <button class="nav-btn" data-tab="calendar" onclick="switchTab('calendar')">
                    <span class="nav-icon">□</span><span>Calendar</span>
                </button>
                <button class="nav-btn" data-tab="community" onclick="switchTab('community')">
                    <span class="nav-icon">👥</span><span>Community</span>
                </button>
                <button class="nav-btn" data-tab="profile" onclick="switchTab('profile')">
                    <span class="nav-icon">◇</span><span>Profile</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyC-x7jiDvqOa-F2Mi-1KySm1cxWD3gpbSs",
  authDomain: "life-tracker-community.firebaseapp.com",
  projectId: "life-tracker-community",
  storageBucket: "life-tracker-community.firebasestorage.app",
  messagingSenderId: "163021030700",
  appId: "1:163021030700:web:2aef8afec8a35455b61889"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        const CIRCUMFERENCE = 2 * Math.PI * 22;
        let currentUser = null;
        let appData = {
            user: { name: '', level: 1, xp: 0, streak: 0 },
            tasks: [],
            selectedCategory: 'iman',
            currentTab: 'progress',
            friends: []
        };
        let calendarMonth = new Date().getMonth();
        let calendarYear = new Date().getFullYear();
        let authMode = 'login';

        // ==================== АВТОРИЗАЦИЯ ====================
        function switchAuthMode(mode) {
            authMode = mode;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[data-mode="${mode}"]`).classList.add('active');
            document.getElementById('authName').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Sign In' : 'Sign Up';
            document.getElementById('authError').textContent = '';
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const name = document.getElementById('authName').value.trim();
            const errorEl = document.getElementById('authError');
            
            errorEl.textContent = '';
            
            if (!email || !password) {
                errorEl.textContent = 'Please fill all fields';
                return;
            }
            
            if (authMode === 'register' && !name) {
                errorEl.textContent = 'Please enter your name';
                return;
            }

            try {
                if (authMode === 'register') {
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(cred.user.uid).set({
                        name: name,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        level: 1,
                        xp: 0,
                        streak: 0
                    });
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                }
            } catch (error) {
                errorEl.textContent = error.message;
            }
        }

        async function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const userDoc = await db.collection('users').doc(result.user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(result.user.uid).set({
                        name: result.user.displayName || '',
                        email: result.user.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        level: 1,
                        xp: 0,
                        streak: 0
                    });
                }
            } catch (error) {
                document.getElementById('authError').textContent = error.message;
            }
        }

        async function logout() {
            await auth.signOut();
            currentUser = null;
            appData = { user: { name: '', level: 1, xp: 0, streak: 0 }, tasks: [], selectedCategory: 'iman', currentTab: 'progress', friends: [] };
            showAuthScreen();
        }

        function showAuthScreen() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainInterface').style.display = 'none';
        }

        function showMainInterface() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainInterface').style.display = 'flex';
        }

        // Слушатель авторизации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                showMainInterface();
                await loadUserData();
                renderAll();
            } else {
                showAuthScreen();
            }
        });

        // ==================== РАБОТА С ДАННЫМИ ====================
        async function loadUserData() {
            if (!currentUser) return;
            
            // Загружаем профиль
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            if (userDoc.exists) {
                appData.user = { ...appData.user, ...userDoc.data() };
            }

            // Загружаем задачи на сегодня
            const today = todayStr();
            const tasksSnap = await db.collection('users').doc(currentUser.uid)
                .collection('tasks').where('date', '==', today).get();
            appData.tasks = [];
            tasksSnap.forEach(doc => {
                appData.tasks.push({ id: doc.id, ...doc.data() });
            });

            // Загружаем друзей
            const friendsSnap = await db.collection('users').doc(currentUser.uid)
                .collection('friends').get();
            appData.friends = [];
            
            // Для каждого друга загружаем его профиль
            for (const friendDoc of friendsSnap.docs) {
                const friendData = friendDoc.data();
                const friendUserDoc = await db.collection('users').doc(friendData.friendId).get();
                if (friendUserDoc.exists) {
                    const friendProfile = friendUserDoc.data();
                    // Загружаем задачи друга на сегодня
                    const friendTasksSnap = await db.collection('users').doc(friendData.friendId)
                        .collection('tasks').where('date', '==', today).get();
                    const friendTasks = [];
                    friendTasksSnap.forEach(t => friendTasks.push(t.data()));
                    
                    appData.friends.push({
                        id: friendData.friendId,
                        name: friendProfile.name || 'User',
                        tasks: friendTasks
                    });
                }
            }
        }

        async function saveTask(task) {
            if (!currentUser) return;
            const today = todayStr();
            
            if (task.firestoreId) {
                // Обновляем существующую
                await db.collection('users').doc(currentUser.uid)
                    .collection('tasks').doc(task.firestoreId).update({
                        completed: task.completed
                    });
            } else {
                // Создаём новую
                const docRef = await db.collection('users').doc(currentUser.uid)
                    .collection('tasks').add({
                        text: task.text,
                        category: task.category,
                        completed: task.completed,
                        date: today,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                task.firestoreId = docRef.id;
            }
        }

        async function deleteTaskFromDB(task) {
            if (!currentUser || !task.firestoreId) return;
            await db.collection('users').doc(currentUser.uid)
                .collection('tasks').doc(task.firestoreId).delete();
        }

        async function addFriend(email) {
            if (!currentUser) return;
            
            // Ищем пользователя по email
            const usersSnap = await db.collection('users').where('email', '==', email).get();
            if (usersSnap.empty) {
                alert('User not found');
                return;
            }
            
            const friendDoc = usersSnap.docs[0];
            if (friendDoc.id === currentUser.uid) {
                alert('You cannot add yourself');
                return;
            }
            
            // Проверяем, не добавлен ли уже
            const existingSnap = await db.collection('users').doc(currentUser.uid)
                .collection('friends').doc(friendDoc.id).get();
            if (existingSnap.exists) {
                alert('Already in your friends list');
                return;
            }
            
            // Добавляем друга
            await db.collection('users').doc(currentUser.uid)
                .collection('friends').doc(friendDoc.id).set({
                    friendId: friendDoc.id,
                    addedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            
            await loadUserData();
            renderAll();
        }

        async function removeFriend(friendId) {
            if (!currentUser) return;
            await db.collection('users').doc(currentUser.uid)
                .collection('friends').doc(friendId).delete();
            await loadUserData();
            renderAll();
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function todayStr() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function getTasksForDate(category, date) {
            return appData.tasks.filter(t => t.category === category && t.date === date);
        }

        function getCategoryProgress(category, date) {
            const tasks = getTasksForDate(category, date);
            if (tasks.length === 0) return 0;
            return Math.round((tasks.filter(t => t.completed).length / tasks.length) * 100);
        }

        function getAllProgress(date) {
            const allTasks = appData.tasks.filter(t => t.date === date);
            if (allTasks.length === 0) return 0;
            return Math.round((allTasks.filter(t => t.completed).length / allTasks.length) * 100);
        }

        function updateRing(category, percent) {
            const ring = document.getElementById('ring-' + category);
            const label = document.getElementById('ringLabel-' + category);
            if (!ring || !label) return;
            const offset = CIRCUMFERENCE - (percent / 100) * CIRCUMFERENCE;
            ring.style.strokeDashoffset = offset;
            label.textContent = percent + '%';
        }

        function updateAllRings() {
            const today = todayStr();
            updateRing('iman', getCategoryProgress('iman', today));
            updateRing('studying', getCategoryProgress('studying', today));
            updateRing('sport', getCategoryProgress('sport', today));
            updateRing('all', getAllProgress(today));
        }

        function highlightRing(category) {
            document.querySelectorAll('.ring-group').forEach(g => g.classList.remove('active'));
            const el = document.querySelector(`.ring-group[data-category="${category}"]`);
            if (el) el.classList.add('active');
        }

        function recalcUserStats() {
            const today = todayStr();
            const allTasks = appData.tasks.filter(t => t.date === today);
            const completed = allTasks.filter(t => t.completed).length;
            appData.user.xp = completed * 10;
            appData.user.level = Math.floor(appData.user.xp / 50) + 1;
            let streak = 0;
            let checkDate = new Date();
            while (true) {
                const ds = checkDate.getFullYear() + '-' + String(checkDate.getMonth() + 1).padStart(2, '0') + '-' + String(checkDate.getDate()).padStart(2, '0');
                const dayTasks = appData.tasks.filter(t => t.date === ds);
                if (dayTasks.length > 0 && dayTasks.some(t => t.completed)) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else if (ds === today && dayTasks.length === 0) {
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }
            appData.user.streak = streak;
            
            // Сохраняем в Firestore
            if (currentUser) {
                db.collection('users').doc(currentUser.uid).update({
                    level: appData.user.level,
                    xp: appData.user.xp,
                    streak: appData.user.streak
                }).catch(err => console.log('Update stats error:', err));
            }
        }

        function getFriendProgress(friend) {
            const categories = ['iman', 'studying', 'sport'];
            const result = {};
            categories.forEach(cat => {
                const tasks = friend.tasks.filter(t => t.category === cat);
                if (tasks.length === 0) result[cat] = 0;
                else result[cat] = Math.round((tasks.filter(t => t.completed).length / tasks.length) * 100);
            });
            result.all = getAllProgressFromTasks(friend.tasks);
            return result;
        }

        function getAllProgressFromTasks(tasks) {
            if (tasks.length === 0) return 0;
            return Math.round((tasks.filter(t => t.completed).length / tasks.length) * 100);
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        // ==================== РЕНДЕРИНГ ====================
        function renderProgressTab() {
            const today = todayStr();
            const categories = ['iman', 'studying', 'sport'];
            const names = { iman: 'Iman', studying: 'Studying', sport: 'Sport' };
            const colors = { iman: 'iman', studying: 'studying', sport: 'sport' };
            const cat = appData.selectedCategory;
            const catsToShow = cat === 'all' ? categories : [cat];

            let html = '';
            catsToShow.forEach(c => {
                const tasks = getTasksForDate(c, today);
                const progress = getCategoryProgress(c, today);
                html += `
                <div class="category-section" data-category="${c}">
                    <div class="category-header">
                        <div class="category-dot ${colors[c]}"></div>
                        <h3>${names[c]}</h3>
                        <span class="progress-text">${progress}% · ${tasks.filter(t => t.completed).length}/${tasks.length}</span>
                    </div>
                    <div class="task-list" id="taskList-${c}">
                        ${tasks.length === 0 ? '<div class="empty-hint">No tasks for today</div>' : ''}
                        ${tasks.map(t => `
                            <div class="task-item ${t.completed ? 'completed' : ''}" data-task-id="${t.id || t.firestoreId}">
                                <div class="task-check">✓</div>
                                <span class="task-text">${escapeHtml(t.text)}</span>
                                <button class="task-delete" data-task-id="${t.id || t.firestoreId}">×</button>
                            </div>
                        `).join('')}
                    </div>
                    <div class="add-task-row">
                        <input type="text" placeholder="Add task..." id="addInput-${c}" maxlength="150">
                        <button style="background:var(--${c});" id="addBtn-${c}">Add</button>
                    </div>
                </div>`;
            });

            document.getElementById('tabContent').innerHTML = html || '<div class="empty-hint">Select a category</div>';

            catsToShow.forEach(c => {
                const taskList = document.getElementById('taskList-' + c);
                if (taskList) {
                    taskList.querySelectorAll('.task-item').forEach(item => {
                        item.addEventListener('click', function(e) {
                            if (e.target.classList.contains('task-delete')) return;
                            toggleTask(this.dataset.taskId);
                        });
                    });
                    taskList.querySelectorAll('.task-delete').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            e.preventDefault();
                            deleteTask(this.dataset.taskId);
                        });
                    });
                }

                const addBtn = document.getElementById('addBtn-' + c);
                const input = document.getElementById('addInput-' + c);
                if (addBtn && input) {
                    addBtn.addEventListener('click', () => addTask(c));
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') addTask(c);
                    });
                }
            });

            if (cat !== 'all') {
                const inp = document.getElementById('addInput-' + cat);
                if (inp) setTimeout(() => inp.focus(), 100);
            }
        }

        function renderCommunityTab() {
            let html = '<div class="section-title">My Friends</div>';
            
            // Добавление друга
            html += `
            <div class="add-friend-row">
                <input type="email" placeholder="Friend's email..." id="friendEmailInput">
                <button onclick="addFriendByEmail()">Add</button>
            </div>`;

            if (appData.friends.length === 0) {
                html += '<div class="empty-hint">No friends yet. Add friends to see their progress!</div>';
            } else {
                appData.friends.forEach(friend => {
                    const progress = getFriendProgress(friend);
                    html += `
                    <div class="friend-card">
                        <div class="friend-header">
                            <div class="friend-avatar">${friend.name[0]?.toUpperCase() || '?'}</div>
                            <div class="friend-info">
                                <div class="friend-name">${escapeHtml(friend.name)}</div>
                                <div class="friend-status">${progress.all}% completed today</div>
                            </div>
                            <button style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:1.2rem;" 
                                    onclick="removeFriend('${friend.id}')">×</button>
                        </div>
                        <div class="friend-progress">
                            <div class="friend-progress-item">
                                <div style="color:#7c3aed;">Iman</div>
                                <div class="friend-progress-value">${progress.iman}%</div>
                            </div>
                            <div class="friend-progress-item">
                                <div style="color:#059669;">Studying</div>
                                <div class="friend-progress-value">${progress.studying}%</div>
                            </div>
                            <div class="friend-progress-item">
                                <div style="color:#dc2626;">Sport</div>
                                <div class="friend-progress-value">${progress.sport}%</div>
                            </div>
                        </div>
                    </div>`;
                });
            }

            document.getElementById('tabContent').innerHTML = html;
        }

        function renderCalendarTab() {
            const year = calendarYear, month = calendarMonth;
            const mNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const dNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDow = (firstDay.getDay() + 6) % 7;
            const days = lastDay.getDate();
            const today = todayStr();

            let html = `
            <div class="calendar-header">
                <button id="calPrevBtn">←</button>
                <h3>${mNames[month]} ${year}</h3>
                <button id="calNextBtn">→</button>
            </div>
            <div class="calendar-grid">
                ${dNames.map(d => `<div class="calendar-day-name">${d}</div>`).join('')}`;
            for (let i = 0; i < startDow; i++) html += '<div class="calendar-day other-month"></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const im = getCategoryProgress('iman', ds), st = getCategoryProgress('studying', ds), sp = getCategoryProgress('sport', ds);
                const has = im > 0 || st > 0 || sp > 0;
                html += `<div class="calendar-day ${ds===today?'today':''}" data-date="${ds}">${d}${has?`<div class="mini-dots">${im>0?'<div class="mini-dot iman"></div>':''}${st>0?'<div class="mini-dot studying"></div>':''}${sp>0?'<div class="mini-dot sport"></div>':''}</div>`:''}</div>`;
            }
            html += '</div>';
            document.getElementById('tabContent').innerHTML = html;

            document.getElementById('calPrevBtn').addEventListener('click', () => changeMonth(-1));
            document.getElementById('calNextBtn').addEventListener('click', () => changeMonth(1));
            document.querySelectorAll('.calendar-day[data-date]').forEach(day => {
                day.addEventListener('click', function() { viewDay(this.dataset.date); });
            });
        }

        function renderProfileTab() {
            const u = appData.user;
            const today = todayStr();
            const totalTasksAllTime = appData.tasks.length;
            const completedAllTime = appData.tasks.filter(t => t.completed).length;
            const todayTasks = appData.tasks.filter(t => t.date === today);
            const todayCompleted = todayTasks.filter(t => t.completed).length;

            let html = `
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar">${u.name ? u.name[0].toUpperCase() : '?'}</div>
                <input type="text" class="profile-name-input" id="profileNameInput" 
                       placeholder="Your name" value="${escapeHtml(u.name)}" maxlength="30">
                <div class="profile-stats">
                    <div class="profile-stat"><div class="profile-stat-value">${u.level}</div><div class="profile-stat-label">Level</div></div>
                    <div class="profile-stat"><div class="profile-stat-value">${u.xp}</div><div class="profile-stat-label">XP</div></div>
                    <div class="profile-stat"><div class="profile-stat-value">${u.streak}d</div><div class="profile-stat-label">Streak</div></div>
                    <div class="profile-stat"><div class="profile-stat-value">${todayCompleted}/${todayTasks.length}</div><div class="profile-stat-label">Today</div></div>
                </div>
            </div>`;

            html += '<div class="section-title">Your Email</div>';
            html += `<div style="background:white;padding:12px;border-radius:10px;text-align:center;font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px;">
                ${currentUser ? currentUser.email : ''}
            </div>`;

            document.getElementById('tabContent').innerHTML = html;

            const nameInput = document.getElementById('profileNameInput');
            if (nameInput) {
                nameInput.addEventListener('input', async function() {
                    appData.user.name = this.value.trim();
                    const avatar = document.getElementById('profileAvatar');
                    if (avatar) avatar.textContent = appData.user.name ? appData.user.name[0].toUpperCase() : '?';
                    if (currentUser) {
                        await db.collection('users').doc(currentUser.uid).update({ name: appData.user.name });
                    }
                });
            }
        }

        function renderAll() {
            if (!currentUser) return;
            updateAllRings();
            highlightRing(appData.selectedCategory);
            switch(appData.currentTab) {
                case 'progress': renderProgressTab(); break;
                case 'calendar': renderCalendarTab(); break;
                case 'community': renderCommunityTab(); break;
                case 'profile': renderProfileTab(); break;
            }
            document.getElementById('dateDisplay').textContent =
                new Date().toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        // ==================== ДЕЙСТВИЯ ====================
        function selectCategory(cat) {
            appData.selectedCategory = cat;
            if (appData.currentTab !== 'progress') switchTab('progress');
            else renderAll();
        }

        function switchTab(tab) {
            appData.currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.nav-btn[data-tab="${tab}"]`);
            if (btn) btn.classList.add('active');
            renderAll();
        }

        async function addTask(category) {
            const input = document.getElementById('addInput-' + category);
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            
            const task = {
                id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                text, category, completed: false, date: todayStr()
            };
            
            appData.tasks.push(task);
            await saveTask(task);
            recalcUserStats();
            input.value = '';
            renderAll();
        }

        async function toggleTask(taskId) {
            const task = appData.tasks.find(t => (t.id || t.firestoreId) === taskId);
            if (!task) return;
            task.completed = !task.completed;
            await saveTask(task);
            recalcUserStats();
            renderAll();
        }

        async function deleteTask(taskId) {
            const task = appData.tasks.find(t => (t.id || t.firestoreId) === taskId);
            if (!task) return;
            await deleteTaskFromDB(task);
            appData.tasks = appData.tasks.filter(t => (t.id || t.firestoreId) !== taskId);
            recalcUserStats();
            renderAll();
        }

        function viewDay(dateStr) {
            alert(`${dateStr}\n\nIman: ${getCategoryProgress('iman', dateStr)}%\nStudying: ${getCategoryProgress('studying', dateStr)}%\nSport: ${getCategoryProgress('sport', dateStr)}%\n\nTotal: ${getAllProgress(dateStr)}%`);
        }

        function changeMonth(d) {
            calendarMonth += d;
            if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
            else if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
            renderAll();
        }

        async function addFriendByEmail() {
            const input = document.getElementById('friendEmailInput');
            if (!input) return;
            const email = input.value.trim();
            if (!email) return;
            await addFriend(email);
            input.value = '';
        }

        // ==================== SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW error:', err));
            });
        }

        console.log('Life Tracker Community Edition ready');
    </script>
</body>
</html>
